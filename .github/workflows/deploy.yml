name: Deploy to Vultr

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy SocialDoctors Next.js to Vultr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vultr via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            # 코드 업데이트
            cd /opt/socialdoctors-nextjs
            git pull origin main

            echo "🔨 Building Docker image..."
            docker build \
              -f frontend/Dockerfile.production \
              -t socialdoctors-nextjs:latest \
              ./frontend

            echo "🔄 Restarting container..."
            docker stop socialdoctors-nextjs 2>/dev/null || true
            docker rm socialdoctors-nextjs 2>/dev/null || true

            docker run -d \
              --name socialdoctors-nextjs \
              --network socialdoctors_internal \
              -p 3110:3000 \
              --env-file /opt/socialdoctors-nextjs/.env.production \
              --restart unless-stopped \
              socialdoctors-nextjs:latest

            echo "⏳ Waiting for app to start..."
            sleep 10

            # 헬스 체크
            if curl -sf http://localhost:3110 > /dev/null 2>&1; then
              echo "✅ Deployment successful! App is running on port 3110"
            else
              echo "❌ Health check failed"
              docker logs socialdoctors-nextjs --tail 50
              exit 1
            fi

            # 오래된 이미지 정리
            docker image prune -f

      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Deployment Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Server: ${{ secrets.VULTR_HOST }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
